name: Bug Report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Brief description of the issue
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Fabric Workspace (Dev)
        - Fabric Workspace (UAT)
        - Fabric Workspace (Prod)
        - ELT Framework / ControlDB
        - Power BI Reports
        - Semantic Models
        - Pipelines / Notebooks
        - Scripts (Python)
        - Scripts (PowerShell)
        - GitHub Actions / CI
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to ...
        2. Run ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, error messages, logs, or any other relevant information
    validations:
      required: false
