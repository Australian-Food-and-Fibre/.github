name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Suggest a feature or improvement for the AFF data platform.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Brief description of the feature
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - ELT Framework / ControlDB
        - Power BI Reports
        - Semantic Models
        - Pipelines / Notebooks
        - Gold Layer
        - ICA Data Processing
        - Scripts / Tooling
        - Documentation
        - Infrastructure / Azure
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this solve or what opportunity does it address?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like this to work
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've considered
    validations:
      required: false
